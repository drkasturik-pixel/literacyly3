<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Family Game</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#f5f0ff;
    text-align:center;
}

.top-bar {
    padding:10px;
    background:#d1c4e9;
    font-size:18px;
    font-weight:bold;
}

.screen {
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active {
    display:flex;
}

.game-container {
    display:flex;
    justify-content:space-around;
    align-items:center;
    width:90%;
}

.left {
    display:flex;
    flex-direction:column;
    align-items:center;
}

.left img {
    width:150px;
    height:150px;
    object-fit:contain;
}

.word-display {
    margin-top:15px;
    font-size:40px;
    font-weight:bold;
    color:#5e35b1;
    min-height:50px;
}

.option {
    padding:20px;
    margin:10px;
    font-size:28px;
    border-radius:15px;
    border:none;
    cursor:pointer;
    background:#ffe082;
}

.option:nth-child(2){
    background:#ffccbc;
}

.option:nth-child(3){
    background:#c8e6c9;
}

.feedback {
    font-size:40px;
    margin-top:10px;
}

button {
    padding:12px 20px;
    font-size:16px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="top-bar">
Look at the picture. Listen to the word. Tap the correct starting letter.
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
    <img src="assets/innovine-logo.png" width="150">
    <h2>Get ready to play the Word Family Game!</h2>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <div class="game-container">

        <div class="left">
            <img id="image" src="">
            
            <!-- WORD APPEARS HERE -->
            <div id="wordDisplay" class="word-display"></div>
        </div>

        <div id="options"></div>

    </div>

    <div id="feedback" class="feedback"></div>

</div>

<!-- END -->
<div id="end" class="screen">
    <h2 id="scoreText"></h2>
    <h3>🎉 Great Job!</h3>
    <button onclick="restart()">🔄 Replay</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="bgMusic" src="assets/background-music.mp3" loop></audio>

<script>

// ✅ FIXED ORDER (NO SHUFFLE)
const questions = [
{word:"jam", img:"assets/jam.png", correct:"j", options:["d","j","f"]},
{word:"cab", img:"assets/cab.png", correct:"c", options:["c","l","t"]},
{word:"dam", img:"assets/dam.png", correct:"d", options:["c","r","d"]},
{word:"crab", img:"assets/crab.png", correct:"c", options:["t","c","n"]},
{word:"cam", img:"assets/cam.png", correct:"c", options:["c","r","h"]},
{word:"lab", img:"assets/lab.png", correct:"l", options:["c","t","l"]},
{word:"ram", img:"assets/ram.png", correct:"r", options:["h","r","c"]},
{word:"tab", img:"assets/tab.png", correct:"t", options:["t","d","r"]},
{word:"ham", img:"assets/ham.png", correct:"h", options:["j","n","h"]},
{word:"dab", img:"assets/dab.png", correct:"d", options:["d","c","t"]}
];

let current = 0;
let score = 0;
let musicStarted = false;
let locked = false;

// 🔊 SPEAK
function speak(text, rate=0.8){
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = rate;
    speechSynthesis.speak(msg);
}

// 🧠 PHONICS
function speakPhonics(word){

    let first = word.charAt(0);
    let family = word.slice(1);

    speak(first, 0.6);

    setTimeout(()=>{
        speak(family, 0.6);
    },700);

    setTimeout(()=>{
        speak(word, 0.8);
    },1400);
}

// 🎵 MUSIC
function startMusic(){

    if(!musicStarted){

        let music = document.getElementById("bgMusic");

        music.volume = 0.2;

        music.play().catch(()=>{});

        musicStarted = true;
    }
}

// 🎬 START
function showGame(){

    document.getElementById("intro").classList.remove("active");
    document.getElementById("game").classList.add("active");

    speak("Look at the picture. Listen to the word. Tap the correct starting letter.");

    setTimeout(loadQuestion, 3000);
    setTimeout(startMusic, 3500);
}

// 📌 LOAD
function loadQuestion(){

    locked = false;

    let q = questions[current];

    let img = document.getElementById("image");

    img.src = "";

    // CLEAR WORD DISPLAY FOR NEW QUESTION
    document.getElementById("wordDisplay").innerText = "";

    setTimeout(()=>{
        img.src = q.img;
    },100);

    speak(q.word);

    setTimeout(()=>{
        speakPhonics(q.word);
    },1000);

    let optionsDiv = document.getElementById("options");

    optionsDiv.innerHTML = "";

    q.options.forEach(opt=>{

        let btn = document.createElement("button");

        btn.className = "option";

        btn.innerText = opt;

        btn.onclick = ()=>{

            if(!locked){

                startMusic();

                checkAnswer(opt);
            }
        };

        optionsDiv.appendChild(btn);
    });
}

// ✅ CHECK
function checkAnswer(ans){

    let q = questions[current];

    let feedback = document.getElementById("feedback");

    if(ans === q.correct){

        locked = true;

        document.getElementById("correctSound").play();

        feedback.innerText = "👏";

        // ✅ SHOW ENTIRE WORD
        document.getElementById("wordDisplay").innerText = q.word;

        // ✅ SPEAK ENTIRE WORD AGAIN
        setTimeout(()=>{
            speak(q.word, 0.8);
        },300);

        score++;

        setTimeout(()=>{

            feedback.innerText = "";

            current++;

            if(current < questions.length){

                loadQuestion();

            } else {

                showEnd();
            }

        },2000);

    } else {

        document.getElementById("wrongSound").play();

        feedback.innerText = "❌";

        setTimeout(()=>{
            speak("Try again", 0.8);
        },600);

        setTimeout(()=>{
            feedback.innerText = "";
        },1200);
    }
}

// 🏁 END
function showEnd(){

    document.getElementById("game").classList.remove("active");

    document.getElementById("end").classList.add("active");

    document.getElementById("scoreText").innerText = "⭐ Score: " + score + "/10";
}

// 🔁 RESTART
function restart(){

    current = 0;
    score = 0;

    document.getElementById("wordDisplay").innerText = "";

    document.getElementById("end").classList.remove("active");

    document.getElementById("game").classList.add("active");

    loadQuestion();
}

setTimeout(showGame, 5000);

</script>

</body>
</html>
