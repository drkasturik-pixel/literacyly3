<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Family Game</title>

<style>
body { margin:0; font-family:Arial; background:#f5f0ff; text-align:center; }

.top-bar {
    padding:10px;
    background:#d1c4e9;
    font-size:18px;
    font-weight:bold;
}

.screen { display:none; height:100vh; justify-content:center; align-items:center; flex-direction:column; }
.active { display:flex; }

.game-container {
    display:flex;
    justify-content:space-around;
    width:90%;
}

.left img {
    width:150px;
    height:150px;
    object-fit:contain;
}

.option {
    padding:20px;
    margin:10px;
    font-size:28px;
    border-radius:15px;
    border:none;
    cursor:pointer;
    background:#ffe082;
}
.option:nth-child(2){background:#ffccbc;}
.option:nth-child(3){background:#c8e6c9;}

.feedback { font-size:40px; margin-top:10px; }
.wordReveal { font-size:32px; margin-top:10px; color:#5e35b1; }
</style>
</head>

<body>

<div class="top-bar">
Look at the picture. Listen to the word. Tap the correct starting letter.
</div>

<!-- INTRO -->
<div id="intro" class="screen active">
    <img src="assets/innovine-logo.png" width="150">
    <h2>Get ready to play the Word Family Game!</h2>
</div>

<!-- GAME -->
<div id="game" class="screen">
    <div class="game-container">
        <div class="left">
            <img id="image" src="">
            <div id="wordReveal" class="wordReveal"></div>
        </div>
        <div id="options"></div>
    </div>
    <div id="feedback" class="feedback"></div>
</div>

<!-- END -->
<div id="end" class="screen">
    <h2 id="scoreText"></h2>
    <h3>🎉 Great Job!</h3>
    <button onclick="restart()">Replay</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="bgMusic" src="assets/background-music.mp3" loop></audio>

<script>
const questions = [
{word:"jam", img:"assets/jam.png", correct:"j", options:["j","d","f"]},
{word:"cab", img:"assets/cab.png", correct:"c", options:["c","l","t"]},
{word:"dam", img:"assets/dam.png", correct:"d", options:["d","c","r"]},
{word:"crab", img:"assets/crab.png", correct:"c", options:["c","t","n"]},
{word:"cam", img:"assets/cam.png", correct:"c", options:["c","r","h"]},
{word:"lab", img:"assets/lab.png", correct:"l", options:["l","c","t"]},
{word:"ram", img:"assets/ram.png", correct:"r", options:["r","h","c"]},
{word:"tab", img:"assets/tab.png", correct:"t", options:["t","d","r"]},
{word:"ham", img:"assets/ham.png", correct:"h", options:["h","j","n"]},
{word:"dab", img:"assets/dab.png", correct:"d", options:["d","c","t"]}
];

let current = 0;
let score = 0;
let musicStarted = false;

// 🔊 SPEAK FUNCTION
function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.8;
    speechSynthesis.speak(msg);
}

// 🎵 START MUSIC SAFELY
function startMusic(){
    if(!musicStarted){
        let music = document.getElementById("bgMusic");
        music.volume = 0.2;
        music.play().catch(()=>{});
        musicStarted = true;
    }
}

// 🎬 START GAME
function showGame(){
    document.getElementById("intro").classList.remove("active");
    document.getElementById("game").classList.add("active");

    speak("Look at the picture. Listen to the word. Tap the correct starting letter.");

    setTimeout(loadQuestion, 3000);

    // fallback autoplay attempt
    setTimeout(startMusic, 3500);
}

// 📌 LOAD QUESTION
function loadQuestion(){
    let q = questions[current];

    let img = document.getElementById("image");

    // safer image loading
    img.src = "";
    setTimeout(()=>{ img.src = q.img; },100);

    document.getElementById("wordReveal").innerText = "";

    speak(q.word);

    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach(opt=>{
        let btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;

        btn.onclick = ()=>{
            startMusic(); // required for mobile
            checkAnswer(opt);
        };

        optionsDiv.appendChild(btn);
    });
}

// ✅ CHECK ANSWER
function checkAnswer(ans){
    let q = questions[current];
    let feedback = document.getElementById("feedback");

    if(ans === q.correct){
        document.getElementById("correctSound").play();
        feedback.innerText = "👏";

        // show word only after correct
        document.getElementById("wordReveal").innerText = q.word;

        score++;
    } else {
        document.getElementById("wrongSound").play();
        feedback.innerText = "❌";
    }

    setTimeout(()=>{
        feedback.innerText="";
        current++;

        if(current < questions.length){
            loadQuestion();
        } else {
            showEnd();
        }
    },1500);
}

// 🏁 END SCREEN
function showEnd(){
    document.getElementById("game").classList.remove("active");
    document.getElementById("end").classList.add("active");
    document.getElementById("scoreText").innerText = "⭐ Score: " + score + "/10";
}

// 🔁 RESTART
function restart(){
    current = 0;
    score = 0;
    document.getElementById("end").classList.remove("active");
    document.getElementById("game").classList.add("active");
    loadQuestion();
}

// ⏳ INTRO TIMER
setTimeout(showGame, 5000);
</script>

</body>
</html>
